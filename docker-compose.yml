version: '3.8'

services:
  # Postgres - OLTP data store for operational Snyk data
  postgres:
    image: postgres:16-alpine
    container_name: snyk-graph-postgres
    environment:
      POSTGRES_USER: snyk
      POSTGRES_PASSWORD: demo_password_change_me
      POSTGRES_DB: snyk_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/schema/snyk_oltp_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U snyk"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DuckDB via HTTP (for warehouse/analytics queries)
  # In production, this would be Snowflake, BigQuery, or Redshift
  duckdb:
    image: davidgasquez/duckdb:latest
    container_name: snyk-graph-duckdb
    ports:
      - "8080:8080"
    volumes:
      - ./data/warehouse:/data
    command: duckdb /data/analytics.db -readonly

  # Graph Engine API Server
  graph-engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: snyk-graph-engine
    environment:
      DATABASE_URL: postgresql://snyk:demo_password_change_me@postgres:5432/snyk_demo
      GRAPH_SCHEMA_PATH: /app/data/schema/graph_schema.yaml
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./graph-engine:/app/graph-engine
      - ./data:/app/data

  # Interactive Frontend UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: snyk-graph-ui
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - graph-engine

  # Optional: Grafana for performance monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: snyk-graph-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-postgresql-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources

volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local

networks:
  default:
    name: snyk-graph-network
